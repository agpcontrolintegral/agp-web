<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AGP ERP" />
  <title>AGP Platform Firebase</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="admin.css" />
<link rel="stylesheet" href="brand-admin-v3.css?v=3.0.2"></head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="agp-logo-main.png" alt="AGP" style="width:54px;height:54px;object-fit:contain;background:white;border-radius:12px;padding:4px">
        <div><strong>AGP ERP</strong><span>Control Integral</span></div>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-foot">
        <button class="ghost-btn" data-action="backup">Respaldo</button><button class="ghost-btn" id="logoutBtn">Cerrar sesión</button>
        <div class="version">v3.0 · Firebase</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn mobile-only" id="menuBtn" aria-label="Menú">☰</button>
          <div><h1 id="pageTitle">Dashboard</h1><p id="pageSubtitle">Resumen ejecutivo del negocio</p></div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="themeBtn" title="Cambiar tema">◐</button>
          <button class="primary-btn" id="quickAddBtn">＋ Nuevo</button>
        </div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <div class="overlay" id="overlay"></div>
  <section class="modal" id="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head"><div><h2 id="modalTitle"></h2><p id="modalSubtitle"></p></div><button class="icon-btn" id="closeModal">×</button></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </section>

  <section class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head"><div><div class="eyebrow">Detalle</div><h2 id="drawerTitle"></h2></div><button class="icon-btn" id="closeDrawer">×</button></div>
    <div class="drawer-body" id="drawerBody"></div>
  </section>

  <input type="file" id="importFile" accept="application/json" hidden />
  <div class="toast" id="toast"></div>
  <script type="module" src="admin-bootstrap.js?v=3.0.1"></script>
</body>
</html>
